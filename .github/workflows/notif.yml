name: PR Feishu Notification

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    # 仅在 PR 被创建（opened）或被合并（closed && merged）时通知
    if: github.event.action == 'opened' || (github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Compose message variables
        id: vars
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            echo "title=🆕 新 Pull Request 已创建" >> "$GITHUB_OUTPUT"
            echo "status=Opened" >> "$GITHUB_OUTPUT"
          else
            echo "title=✅ Pull Request 已合并" >> "$GITHUB_OUTPUT"
            echo "status=Merged" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Feishu Notification
        uses: XRSec/feishu-bot-webhook-action@v1
        with:
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          MSG_TEXT: |
            ## ${{ steps.vars.outputs.title }}

            **仓库**: [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            **PR**: [#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})
            **状态**: ${{ steps.vars.outputs.status }}
            **作者**: [${{ github.event.pull_request.user.login }}](${{ github.event.pull_request.user.html_url }})
            **分支**: `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`
            **变更**: +${{ github.event.pull_request.additions }} / -${{ github.event.pull_request.deletions }}（${{ github.event.pull_request.changed_files }} 个文件）

            👉 [点击查看 PR 详情](${{ github.event.pull_request.html_url }})
